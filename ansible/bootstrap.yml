---
# Bootstrap playbook - Initial server configuration
- name: Configure server for Kubernetes deployment
  hosts: all
  gather_facts: no
  remote_user: ubuntu
  become: yes
  become_method: sudo

  pre_tasks:
    - name: Remove require tty
      lineinfile:
        regexp: "requiretty"
        dest: /etc/sudoers.d/os_defaults
        state: absent
      ignore_errors: yes

    - name: Configure passwordless sudo
      lineinfile:
        dest: /etc/sudoers
        state: present
        regexp: '^%ADMIN ALL='
        line: '%ADMIN ALL=(ALL) NOPASSWD: ALL'
        validate: /usr/sbin/visudo -cf %s

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install basic packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
        state: present

    - name: Set timezone to UTC
      timezone:
        name: UTC

    - name: Ensure server is ready
      debug:
        msg: "Server configuration complete"
