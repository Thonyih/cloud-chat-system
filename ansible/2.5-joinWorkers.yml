---
- name: Get join command from master
  hosts: master
  become: no
  tasks:
    - name: Generate join command
      shell: kubeadm token create --print-join-command
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: join_command_output

    - name: Set join command as fact
      set_fact:
        join_command: "{{ join_command_output.stdout }}"

- name: Join worker nodes to cluster
  hosts: workers
  become: yes
  tasks:
    - name: Reset kubeadm if previously initialized
      shell: kubeadm reset --force
      ignore_errors: yes

    - name: Join cluster
      shell: "{{ hostvars[groups['master'][0]].join_command }}"
      register: join_result

    - name: Show join result
      debug:
        var: join_result.stdout_lines

- name: Verify cluster nodes
  hosts: master
  become: no
  tasks:
    - name: Wait for nodes to be ready
      shell: kubectl get nodes
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: nodes_status
      retries: 10
      delay: 10
      until: nodes_status.stdout.find('NotReady') == -1

    - name: Show all cluster nodes
      debug:
        msg: "{{ nodes_status.stdout_lines }}"