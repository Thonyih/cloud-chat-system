server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # API proxies (prefix match; cobre /contacts e /contacts/ etc.)
  # Auth and Users are now combined in auth-users service
  location ^~ /register {
    proxy_pass http://auth-users:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
  }

  location ^~ /login {
    proxy_pass http://auth-users:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
  }

  location ^~ /users {
    proxy_pass http://auth-users:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
  }

  location /contacts {
    proxy_pass http://contacts:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
  }

  location /messages {
    proxy_pass http://messages:8084;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
  }

  location /groups {
    proxy_pass http://groups:8085;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
  }

  # SPA static files (last)
  location / {
    try_files $uri $uri/ /index.html;
    # Disable caching for development
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    expires off;
  }

  error_log /var/log/nginx/error.log warn;
  access_log /var/log/nginx/access.log;
}