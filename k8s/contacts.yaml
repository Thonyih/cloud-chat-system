apiVersion: v1
kind: Service
metadata: { name: contacts }
spec:
  selector: { app: contacts }
  ports: [{ port: 8083, targetPort: 8083 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: contacts }
spec:
  replicas: 1
  selector: { matchLabels: { app: contacts } }
  template:
    metadata: { labels: { app: contacts } }
    spec:
      containers:
        - name: contacts
          image: antonioregistry/contacts:latest
          ports: [{ containerPort: 8083 }]
          env:
            - { name: DB_HOST, value: "contacts-db" }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_USER, value: "chat" }
            - { name: DB_NAME, value: "contacts_db" }
            - name: DB_PASSWORD
              valueFrom:
                { secretKeyRef: { name: app-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              valueFrom:
                { secretKeyRef: { name: app-secrets, key: JWT_SECRET } }
            - { name: AUTH_SERVICE_URL, value: "http://auth-users:8081" }
            - { name: PORT, value: "8083" }
