apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: messages-pgdata }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: messages-db }
spec: { selector: { app: messages-db }, ports: [{ port: 5432, targetPort: 5432 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: messages-db }
spec:
  selector: { matchLabels: { app: messages-db } }
  template:
    metadata: { labels: { app: messages-db } }
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - { name: POSTGRES_USER,     value: "chat" }
        - { name: POSTGRES_PASSWORD, value: "chatpass" }
        - { name: POSTGRES_DB,       value: "messages_db" }
        ports: [{ containerPort: 5432 }]
        volumeMounts:
        - { name: data,   mountPath: /var/lib/postgresql/data }
        - { name: initdb, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: messages-pgdata }
      - name: initdb
        configMap: { name: messages-sql }
