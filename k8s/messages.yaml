apiVersion: v1
kind: Service
metadata: { name: messages }
spec:
  type: NodePort
  selector: { app: messages }
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 31403
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: messages }
spec:
  replicas: 1
  selector: { matchLabels: { app: messages } }
  template:
    metadata: { labels: { app: messages } }
    spec:
      containers:
        - name: messages
          image: antonioregistry/messages:latest
          ports: [{ containerPort: 8084 }]
          env:
            - { name: DB_HOST, value: "messages-db" }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_USER, value: "chat" }
            - { name: DB_NAME, value: "messages_db" }
            - name: DB_PASSWORD
              valueFrom:
                { secretKeyRef: { name: app-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              valueFrom:
                { secretKeyRef: { name: app-secrets, key: JWT_SECRET } }
            - { name: AUTH_SERVICE_URL, value: "http://auth-users:8081" }
            - { name: CONTACTS_SERVICE_URL, value: "http://contacts:8083" }
            - { name: GROUPS_SERVICE_URL, value: "http://groups:8085" }
            - { name: PORT, value: "8084" }
